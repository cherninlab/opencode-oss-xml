name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  release:
    types: [published, created]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome Check
        run: bun run lint

      - name: Run Unit Tests
        run: bun run test
